<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121212">

  <title>Wildu Hub</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192-maskable.png">
  <link rel="apple-touch-icon" href="icon-192-maskable.png">

  <style>
    :root {
      --bg: #121212;
      --panel: #181818;
      --border: rgba(255,255,255,0.12);
      --text: #f8f9fa;
      --muted: #c9c9c9;
      --accent: #20c997;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    #topbar {
      height: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
      background: #0f0f0f;
      border-bottom: 1px solid var(--border);
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #brand img {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      flex: 0 0 auto;
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    #frame-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      background: var(--bg);
    }

    #gas-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg);
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: var(--bg);
      z-index: 2;
      transition: opacity 0.25s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-card {
      width: min(420px, 92vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 22px 80px rgba(0,0,0,0.35);
    }

    .spinner {
      width: 38px;
      height: 38px;
      margin: 0 auto 14px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .loader-text {
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
    }

    #fallback {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    #fallback a {
      display: inline-block;
      margin-top: 10px;
      color: #121212;
      background: var(--accent);
      padding: 9px 13px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      #topbar {
        height: 40px;
        min-height: 40px;
        padding: 0 10px;
      }

      #status {
        display: none;
      }

      #brand {
        font-size: 14px;
      }

      #brand img {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>

<body>
  <div id="app-shell">
    <div id="topbar">
      <div id="brand">
        <img src="icon-192-maskable.png" alt="Wildu">
        <span>Wildu Hub</span>
      </div>
      <div id="status">PWA Container</div>
    </div>

    <div id="frame-wrap">
      <div id="loading">
        <div class="loader-card">
          <div class="spinner"></div>
          <div class="loader-title">Apertura Wildu Hub...</div>
          <div class="loader-text">
            Sto caricando il pannello dentro la finestra app.
          </div>

          <div id="fallback">
            Se il login Google o Apps Script bloccano l’incorporamento, apri temporaneamente il pannello in browser.
            <br>
            <a id="fallback-link" href="#" target="_blank" rel="noopener noreferrer">Apri pannello GAS</a>
          </div>
        </div>
      </div>

      <iframe
        id="gas-frame"
        title="Wildu Hub GAS"
        src="https://script.google.com/macros/s/AKfycbyFtBdZ0RGjCBpyHN8E4qOGnAny_VfLMpiJaKyaq8edZBRQ6XwlptP9BLcVibk_6xsS/exec"
        allow="clipboard-read; clipboard-write"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFtBdZ0RGjCBpyHN8E4qOGnAny_VfLMpiJaKyaq8edZBRQ6XwlptP9BLcVibk_6xsS/exec";

    const frame = document.getElementById('gas-frame');
    const loading = document.getElementById('loading');
    const fallback = document.getElementById('fallback');
    const fallbackLink = document.getElementById('fallback-link');

    fallbackLink.href = GAS_URL;

    let loaded = false;

    frame.addEventListener('load', function() {
      loaded = true;

      setTimeout(function() {
        loading.classList.add('hidden');
      }, 500);
    });

    setTimeout(function() {
      if (!loaded) {
        fallback.style.display = 'block';
      }
    }, 7000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(err) {
          console.warn('[WILDU SHELL] Service worker non registrato:', err);
        });
      });
    }
  </script>
</body>
</html>
